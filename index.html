<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // You need that function because getRandomInt isn't built into JavaScript; without defining it, your browser throws a ReferenceError because it doesn't know what that command means. The function acts as a translator for Math.random(), which normally only generates tiny decimals between 0 and 0.999. By multiplying that decimal by your max value (3) and passing it through Math.floor(), the code truncates the decimal points and rounds downward, cleanly converting a random decimal into the exact whole numbers (0, 1, or 2) your computer choice function needs to run.
       function getRandomInt(max) {
    return Math.floor(Math.random() * max);
}

        let computerNumber = 0;
        let randomNumber = 0;
       function  GCC(){
        // FIX: Save the roll to a variable once so it doesn't change mid-check
            let roll = getRandomInt(3);
            console.log(roll);
        if (roll == 0 ){
            computerNumber = 0;
            
       }else if (roll == 1) {
            computerNumber = 1;
       }else {
            computerNumber = 2;
       }
         }
         function getHumanChoice(){
            let answer = prompt("Enter your choice (rock, paper, scissors):");
            console.log(answer.toLowerCase());
            if (answer.toLowerCase() === "rock") {
                randomNumber = 1;
            } else if (answer.toLowerCase() === "paper") {
                randomNumber = 2;
            } else if (answer.toLowerCase() === "scissors") {
                randomNumber = 0;
            }
        }

        let humanScore = 0;
        let computerScore = 0;
        function playRound (randomNumber, computerNumber){
            if (randomNumber === computerNumber) {
                console.log("It's a tie!");
            } else if (randomNumber === 0 && computerNumber === 2){
                    console.log("You win! Scissors beats Rock.");
                    humanScore++;
                } else if  (randomNumber === 2 && computerNumber === 1){
                    console.log("You win! Paper beats Rock.");
                    humanScore++;

                } else if (randomNumber === 1 && computerNumber === 0){
                    console.log("You win! Rock beats Scissors.");
                    humanScore++;
                } else {
                    console.log("You lose!");
                    computerScore++;
                }
               
            }
            //The loop sits at the end because functions are just definitions (like recipes)—they won't execute until you explicitly call them, so you must write them first before your loop can safely run them. Furthermore, `GCC()` and `getHumanChoice()` have empty parentheses because they are completely self-sufficient and don't need any outside information to do their jobs (one generates its own random number, and the other asks the user via a prompt). In contrast, `playRound(randomNumber, computerNumber)` *does* have inputs inside its parentheses because it cannot blindly judge a winner; it requires the loop to pass it those two specific choices to compare them.
            //why not loopn through the whole code? Looping the entire code forces the computer to rebuild your functions from scratch 5 times, wasting memory. You only want to define a function once, and then use the loop at the bottom to simply run them.
      for (let i = 0; i < 5; i++) {
            GCC();
            getHumanChoice();
            playRound(randomNumber, computerNumber);
            if (humanScore >= 3){
                console.log("You won the game!");
                break;
                //You use a break; statement when you want to instantly exit a loop before its natural stopping condition is met.
            } else if (computerScore >= 3){
                console.log("Computer won the game!");
                break;
            }
            
        }
    
    </script>
</body>
</html>
